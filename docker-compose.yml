# ============================================================
# ResolveAI - Docker Compose (Development)
# ============================================================
# Start all services: docker compose up -d
# Stop all services:  docker compose down
# Reset (with data):  docker compose down -v && docker compose up -d

version: "3.9"

services:
  # ---- PostgreSQL 16 + pgvector ----
  db:
    image: pgvector/pgvector:pg16
    container_name: resolveai-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-resolveai}
      POSTGRES_USER: ${POSTGRES_USER:-resolveai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-resolveai-dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-resolveai} -d ${POSTGRES_DB:-resolveai}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---- Backend (FastAPI) ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: resolveai-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-resolveai}:${POSTGRES_PASSWORD:-resolveai-dev}@db:5432/${POSTGRES_DB:-resolveai}
      LLM_PROVIDER: ${LLM_PROVIDER:-anthropic}
      LLM_MODEL: ${LLM_MODEL:-claude-sonnet-5-20251001}
      LLM_API_KEY: ${LLM_API_KEY}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://api.anthropic.com}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-openai}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret-change-in-production}
      APP_ENV: ${APP_ENV:-development}
      DEBUG: ${DEBUG:-true}
      LOG_LEVEL: ${LOG_LEVEL:-DEBUG}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:3001}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             python -m app.database.seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app
    restart: unless-stopped

  # ---- Customer Web (Next.js) ----
  customer-web:
    build:
      context: ./frontend/customer-web
      dockerfile: Dockerfile
    container_name: resolveai-customer-web
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
      NEXT_PUBLIC_AGENT_WS_URL: ${NEXT_PUBLIC_AGENT_WS_URL:-ws://localhost:8000/api/v1/agent/ws}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  # ---- Admin Web (Next.js) ----
  admin-web:
    build:
      context: ./frontend/admin-web
      dockerfile: Dockerfile
    container_name: resolveai-admin-web
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
    ports:
      - "3001:3001"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
    driver: local
