# ResolveAI — Docker Compose (Development / Demo)
# Start:  docker compose up -d
# Stop:   docker compose down
# Reset:  docker compose down -v && docker compose up -d

services:
  # ── PostgreSQL 16 + pgvector ──
  db:
    image: pgvector/pgvector:pg16
    container_name: resolveai-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-resolveai}
      POSTGRES_USER: ${POSTGRES_USER:-resolveai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-resolveai-dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-resolveai}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Backend (FastAPI + LangGraph) ──
  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: resolveai-backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-resolveai}:${POSTGRES_PASSWORD:-resolveai-dev}@db:5432/${POSTGRES_DB:-resolveai}
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      LLM_MODEL: ${LLM_MODEL:-qwen3.7-plus}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-mock}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret-change-in-production}
      APP_ENV: ${APP_ENV:-development}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:3001}
      DEMO_CUSTOMER_EMAIL: ${DEMO_CUSTOMER_EMAIL:-demo@example.com}
      DEMO_CUSTOMER_PASSWORD: ${DEMO_CUSTOMER_PASSWORD:-demo123456}
      DEMO_ADMIN_EMAIL: ${DEMO_ADMIN_EMAIL:-admin@example.com}
      DEMO_ADMIN_PASSWORD: ${DEMO_ADMIN_PASSWORD:-admin123456}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             python -m app.database.seed &&
             python -m app.database.ingest_policies &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Customer Web (Next.js) ──
  customer-web:
    build:
      context: ./frontend/customer-web
      dockerfile: Dockerfile
    container_name: resolveai-customer-web
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # ── Admin Web (Next.js) ──
  admin-web:
    build:
      context: ./frontend/admin-web
      dockerfile: Dockerfile
    container_name: resolveai-admin-web
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000/api/v1}
    ports:
      - "3001:3001"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
    driver: local
